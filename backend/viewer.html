<!DOCTYPE html>
<html>
<head>
    <script src="https://3Dmol.csb.pitt.edu/build/3Dmol-min.js"></script>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: white;
        }

        #viewer {
            width: 100%;
            height: 600px;
        }

        #panel {
            padding: 15px;
            border-top: 1px solid #ddd;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        select, button {
            padding: 6px 10px;
            border: 1px solid #ccc;
            background: white;
            cursor: pointer;
        }

        .energy {
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="viewer"></div>

<div id="panel">
    <div class="energy">
        Binding Energy: <span id="energyValue">--</span> kcal/mol
    </div>

    <div id="controls">
        <label>Pose:</label>
        <select id="poseSelector"></select>
        <button onclick="toggleSurface()">Toggle Surface</button>
        <button onclick="resetView()">Reset View</button>
    </div>
</div>

<script>

let viewer = $3Dmol.createViewer("viewer", {
    backgroundColor: "white"
});

let proteinModel = null;
let ligandModels = [];
let surfaceOn = false;
let energies = [];

// =======================
// Load Protein
// =======================
fetch("/uploads/protein.pdbqt")
.then(res => res.text())
.then(data => {

    proteinModel = viewer.addModel(data, "pdbqt");

    viewer.setStyle(
        {model: 0},
        {cartoon: {color: "#A0A0A0"}}
    );

    viewer.zoomTo();
    viewer.render();
});


// =======================
// Load Docked Poses
// =======================
fetch("/uploads/docked.pdbqt")
.then(res => res.text())
.then(data => {

    let poseBlocks = data.split("MODEL").slice(1);

    poseBlocks.forEach((block, index) => {

        let modelText = "MODEL" + block;

        let model = viewer.addModel(modelText, "pdbqt");

        ligandModels.push(model);

        let option = document.createElement("option");
        option.value = index;
        option.text = "Pose " + (index + 1);
        document.getElementById("poseSelector").appendChild(option);
    });

    showPose(0);
    viewer.render();
});


// =======================
// Load Energy Data
// =======================
fetch("/uploads/last_result.json")
.then(res => res.json())
.then(data => {

    if (data.poses) {
        energies = data.poses.map(p => p.affinity);
        document.getElementById("energyValue").innerText = energies[0];
    }
});


// =======================
// Pose Switcher
// =======================
function showPose(index) {

    ligandModels.forEach(model => {
        viewer.setStyle({model: model}, {});
    });

    let selected = ligandModels[index];

    viewer.setStyle(
        {model: selected},
        {stick: {colorscheme: "greenCarbon"}}
    );

    viewer.zoomTo({model: selected});
    viewer.render();

    if (energies.length > 0) {
        document.getElementById("energyValue").innerText = energies[index];
    }
}

document.getElementById("poseSelector")
.addEventListener("change", function() {
    showPose(parseInt(this.value));
});


// =======================
// Toggle Surface
// =======================
function toggleSurface() {

    if (!surfaceOn) {
        viewer.addSurface(
            $3Dmol.SurfaceType.VDW,
            {
                opacity: 0.25,
                color: "#D3D3D3"
            },
            {model: 0}
        );
        surfaceOn = true;
    } else {
        viewer.removeAllSurfaces();
        surfaceOn = false;
    }

    viewer.render();
}


// =======================
// Reset View
// =======================
function resetView() {
    viewer.zoomTo();
    viewer.render();
}

</script>

</body>
</html>
